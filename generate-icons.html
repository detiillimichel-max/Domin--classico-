<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Ícones - Jogo de Dominó</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
        .container {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .icon-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #dee2e6;
        }
        .icon-preview {
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .download-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }
        .download-btn:hover {
            background: #2980b9;
        }
        .download-all {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            width: 100%;
        }
        .download-all:hover {
            background: #229954;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #d4edda;
            color: #155724;
            border-radius: 5px;
            display: none;
        }
        canvas {
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Gerador de Ícones - Jogo de Dominó 🀫</h1>
        <p style="text-align: center;">Clique nos botões abaixo para baixar os ícones individualmente ou baixe todos de uma vez.</p>
        
        <div class="icon-grid" id="icon-grid"></div>
        
        <button class="download-all" id="download-all">📦 Baixar TODOS os ícones (ZIP)</button>
        <div class="status" id="status"></div>
        
        <p style="margin-top: 20px; font-size: 12px; color: #666; text-align: center;">
            ✅ Depois de baixar, coloque todos os ícones na pasta <strong>/icons/</strong> do seu projeto
        </p>
    </div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function createIconCanvas(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Fundo gradiente
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Borda
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.03;
            ctx.strokeRect(size * 0.05, size * 0.05, size * 0.9, size * 0.9);
            
            // Desenhar peça de dominó estilizada
            const dominoWidth = size * 0.6;
            const dominoHeight = size * 0.8;
            const dominoX = (size - dominoWidth) / 2;
            const dominoY = (size - dominoHeight) / 2;
            
            // Fundo branco da peça
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(dominoX, dominoY, dominoWidth, dominoHeight);
            
            // Borda da peça
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = size * 0.02;
            ctx.strokeRect(dominoX, dominoY, dominoWidth, dominoHeight);
            
            // Linha do meio
            ctx.beginPath();
            ctx.moveTo(dominoX, dominoY + dominoHeight/2);
            ctx.lineTo(dominoX + dominoWidth, dominoY + dominoHeight/2);
            ctx.stroke();
            
            // Desenhar pontos do dominó
            function drawDots(x, y, count, dotSize) {
                const dotRadius = dotSize / 2;
                const spacing = dotSize * 1.5;
                
                if (count === 1) {
                    ctx.beginPath();
                    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                } else if (count === 2) {
                    ctx.beginPath();
                    ctx.arc(x - spacing/2, y, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + spacing/2, y, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (count === 3) {
                    ctx.beginPath();
                    ctx.arc(x - spacing/2, y - spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + spacing/2, y + spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (count === 4) {
                    ctx.beginPath();
                    ctx.arc(x - spacing/2, y - spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + spacing/2, y - spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x - spacing/2, y + spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + spacing/2, y + spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (count === 5) {
                    drawDots(x, y, 4, dotSize);
                    ctx.beginPath();
                    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (count === 6) {
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            if (i !== 0 || j !== 0) {
                                ctx.beginPath();
                                ctx.arc(x + i * spacing/2, y + j * spacing/2, dotRadius, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    }
                }
            }
            
            // Definir números do dominó (exemplo: 6|5)
            const topNumber = 6;
            const bottomNumber = 5;
            const dotSize = size * 0.06;
            
            const centerX = dominoX + dominoWidth/2;
            const topCenterY = dominoY + dominoHeight/4;
            const bottomCenterY = dominoY + 3 * dominoHeight/4;
            
            drawDots(centerX, topCenterY, topNumber, dotSize);
            drawDots(centerX, bottomCenterY, bottomNumber, dotSize);
            
            // Adicionar texto do tamanho
            ctx.font = `bold ${size * 0.08}px Arial`;
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 0;
            ctx.fillText(`${size}x${size}`, size * 0.1, size * 0.95);
            
            return canvas;
        }
        
        function downloadIcon(size) {
            const canvas = createIconCanvas(size);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        async function downloadAllIcons() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '🔄 Gerando ícones... Aguarde...';
            
            const zip = new JSZip();
            
            for (const size of sizes) {
                statusDiv.innerHTML = `🔄 Gerando ícone ${size}x${size}...`;
                const canvas = createIconCanvas(size);
                const dataURL = canvas.toDataURL('image/png');
                const base64Data = dataURL.split(',')[1];
                zip.file(`icon-${size}.png`, base64Data, { base64: true });
                
                // Pequeno delay para não travar o navegador
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            statusDiv.innerHTML = '📦 Criando arquivo ZIP...';
            const content = await zip.generateAsync({ type: 'blob' });
            
            const link = document.createElement('a');
            link.download = 'domino-icons.zip';
            link.href = URL.createObjectURL(content);
            link.click();
            
            statusDiv.innerHTML = '✅ Todos os ícones foram baixados com sucesso!';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        // Criar previews dos ícones
        const grid = document.getElementById('icon-grid');
        for (const size of sizes) {
            const canvas = createIconCanvas(size);
            const previewCanvas = document.createElement('canvas');
            previewCanvas.width = 100;
            previewCanvas.height = 100;
            const previewCtx = previewCanvas.getContext('2d');
            previewCtx.drawImage(canvas, 0, 0, size, size, 0, 0, 100, 100);
            
            const div = document.createElement('div');
            div.className = 'icon-item';
            div.innerHTML = `
                <strong>${size}x${size}</strong>
                <div class="icon-preview"></div>
                <button class="download-btn" data-size="${size}">📥 Baixar</button>
            `;
            div.querySelector('.icon-preview').appendChild(previewCanvas);
            div.querySelector('.download-btn').addEventListener('click', () => downloadIcon(size));
            grid.appendChild(div);
        }
        
        document.getElementById('download-all').addEventListener('click', downloadAllIcons);
        
        // Carregar JSZip da CDN
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        document.head.appendChild(script);
    </script>
</body>
</html>
