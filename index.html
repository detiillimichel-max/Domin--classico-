<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <meta name="description" content="Jogo de Dominó clássico em JavaScript">
    <link rel="manifest" href="manifest.json">
    <title>Jogo de Dominó</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🀫 Jogo de Dominó 🀫</h1>
            <div class="score">
                <div>Jogador: <span id="player-score">0</span></div>
                <div>Computador: <span id="computer-score">0</span></div>
            </div>
        </header>

        <div class="game-area">
            <div class="computer-pieces">
                <h3>Peças do Computador</h3>
                <div id="computer-hand" class="hand"></div>
            </div>

            <div class="table">
                <div id="table" class="domino-table"></div>
                <div class="game-info">
                    <p id="turn-indicator" class="turn">Vez do Jogador</p>
                    <div class="buttons">
                        <button id="reset-game" class="btn">Novo Jogo</button>
                        <button id="pass-turn" class="btn">Passar Vez</button>
                    </div>
                </div>
            </div>

            <div class="player-pieces">
                <h3>Suas Peças</h3>
                <div id="player-hand" class="hand"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
